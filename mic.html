<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Micrómono - Field Data</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        h1 { color: #075e54; }
        .box { background: white; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .btn { background: #075e54; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; display: inline-block; font-weight: bold; }
        code { background: #eee; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🌾 Field Data - Micrófono</h1>
    
    <div class="box">
        <h2>Si el micrófono no funciona:</h2>
        <p>Ir a: <code>chrome://settings/permissions</code></p>
        <p>O escribir en la barra: <code>Permisos del sitio</code></p>
        <br>
        <p>Buscar "localhost" y cambiar a <strong>Permitir</strong></p>
    </div>
    
    <a href="index.html" class="btn">← Volver al Chat</a>
    
    <script>
        // Auto-test mic
        navigator.mediaDevices.getUserMedia({audio:true})
            .then(s => { s.getTracks().forEach(t=>t.stop()); alert('✅ Micrófono OK'); window.location='index.html'; })
            .catch(e => alert('❌仍在 blocked. Seguí los pasos de arriba.'));
    </script>
</body>
</html>
